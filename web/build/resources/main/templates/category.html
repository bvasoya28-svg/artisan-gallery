<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${category} + ' - Artisan Gallery'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="sticky-header">
        <div class="container header-content">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a th:href="@{/home}" style="color: var(--forest-green); font-size: 1.2rem;"><i class="fas fa-chevron-left"></i></a>
                <div class="logo">
                    <h1><a th:href="@{/home}">Artisan Gallery</a></h1>
                </div>
            </div>

            <div class="user-profile-header" th:if="${user != null}">
                <span th:text="${user.fullName}">User Name</span>
                <img th:src="${user.profilePicture}" alt="Profile">
            </div>
        </div>
    </header>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a th:href="@{/home}" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>

        <a th:href="@{/search}" class="bottom-nav-item">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </a>

        <a th:href="@{/cart}" class="bottom-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </a>

        <a th:href="@{/account}" class="bottom-nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </nav>

    <div class="container sub-page-container">
        <h1 class="serif-font" style="color: var(--forest-green); margin-bottom: 30px; margin-top: 20px;" th:text="${category}">Category Name</h1>

        <div th:if="${#lists.isEmpty(products)}" style="text-align: center; padding: 100px 0;">
             <h2 class="serif-font">No items found in this category yet.</h2>
             <p>Be the first to upload a masterpiece here!</p>
             <a th:href="@{/sell}" class="btn-primary" style="margin-top: 20px;">Upload Item</a>
        </div>

        <div class="product-grid">
            <div th:each="product : ${products}" class="product-card" style="position: relative;">
                <!-- Stock Status Badge -->
                <div style="position: absolute; top: 10px; right: 10px; z-index: 2;">
                    <span th:if="${product.inStock}" style="background: #2d5a27; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        IN STOCK
                    </span>
                    <span th:if="${!product.inStock}" style="background: #d63031; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        OUT OF STOCK
                    </span>
                </div>

                <a th:href="@{/product/{id}(id=${product.id})}" style="text-decoration: none; color: inherit;">
                    <div class="product-image-container">
                        <img th:src="${product.imageUrl}" th:alt="${product.name}" th:style="${!product.inStock ? 'filter: grayscale(0.8) opacity(0.7);' : ''}">
                    </div>
                    <h3 th:text="${product.name}"></h3>
                    <p class="seller" th:text="'by ' + ${product.artist}"></p>
                    <div class="price-rating">
                        <span class="price">₹[[${#numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')}]]</span>
                        <span class="rating">
                            <i class="fas fa-star" th:each="i : ${#numbers.sequence(1, 5)}" th:style="${i <= (product.rating != null ? product.rating : 5) ? 'color: var(--tan)' : 'color: #ddd'}"></i>
                        </span>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
