<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Addresses - Artisan Gallery</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="sticky-header">
        <div class="container header-content">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a th:href="@{/account}" style="color: var(--forest-green); font-size: 1.2rem;"><i class="fas fa-chevron-left"></i></a>
                <div class="logo">
                    <h1><a th:href="@{/home}">Artisan Gallery</a></h1>
                </div>
            </div>

            <div class="user-profile-header" th:if="${user != null}">
                <span th:text="${user.fullName}">User Name</span>
                <img th:src="${user.profilePicture.startsWith('http') ? user.profilePicture : '/images/' + user.profilePicture}" alt="Profile">
            </div>
        </div>
    </header>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a th:href="@{/home}" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>

        <a th:href="@{/search}" class="bottom-nav-item">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </a>

        <a th:href="@{/cart}" class="bottom-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </a>

        <a th:href="@{/account}" class="bottom-nav-item active" style="color: var(--tan);">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </nav>


    <div class="container sub-page-container">
        <div class="centered-form-wrapper" style="max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid #eee;">
            <h1 class="serif-font" style="color: var(--forest-green); margin-bottom: 20px; margin-top: 0;">Your Address</h1>
            <p>Add or update your primary shipping address.</p>

            <hr>

            <form th:action="@{/account/update-address}" method="POST" style="margin-top: 30px;">
                <div style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: bold;">Full Address</label>
                    <textarea name="address" th:text="${address}" placeholder="Enter your full street address, city, and pincode..."
                              style="width: 100%; height: 120px; padding: 15px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit;" required></textarea>
                </div>

                <button type="submit" class="btn-primary">Update Address</button>
            </form>
        </div>
    </div>
</body>
</html>
