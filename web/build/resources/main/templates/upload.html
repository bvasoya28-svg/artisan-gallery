<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seller Dashboard - Artisan Gallery</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('image-preview');
                output.src = reader.result;
                document.getElementById('preview-container').style.display = 'flex';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function toggleLocationFields() {
            const locationType = document.querySelector('input[name="locationType"]:checked').value;
            const areaContainer = document.getElementById('area-container');
            const areaInput = document.getElementById('specificLocation');

            if (locationType === 'Local') {
                areaContainer.style.display = 'block';
                areaInput.required = true;
            } else {
                areaContainer.style.display = 'none';
                areaInput.required = false;
                areaInput.value = 'India';
            }
        }
    </script>
</head>
<body>
    <header class="sticky-header">
        <div class="container header-content">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a th:href="@{/account}" style="color: var(--forest-green); font-size: 1.2rem;"><i class="fas fa-chevron-left"></i></a>
                <div class="logo">
                    <h1><a th:href="@{/home}">Artisan Gallery</a></h1>
                </div>
            </div>

            <div class="user-profile-header" th:if="${user != null}">
                <span th:text="${user.fullName}">User Name</span>
                <img th:src="${user.profilePicture.startsWith('http') ? user.profilePicture : '/images/' + user.profilePicture}" alt="Profile">
            </div>
        </div>
    </header>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a th:href="@{/home}" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>

        <a th:href="@{/search}" class="bottom-nav-item">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </a>

        <a th:href="@{/cart}" class="bottom-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </a>

        <a th:href="@{/account}" class="bottom-nav-item active" style="color: var(--tan);">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </nav>

    <div class="container" style="padding-top: 40px; padding-bottom: 100px;">

        <div style="background: white; padding: 25px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 30px; border-left: 5px solid var(--forest-green); display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 class="serif-font" style="margin: 0; color: var(--forest-green);">Seller Dashboard</h2>
                <p style="margin: 5px 0 0 0; color: #666;">Manage your handmade masterpieces</p>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 1.2rem; font-weight: bold; color: var(--tan);" th:text="${user.lifetimeUploadCount + '/5 Products'}">0/5 Products</span>
                <p style="margin: 2px 0 0 0; font-size: 0.8rem; color: #999;">Free Artisan Tier</p>
            </div>
        </div>

        <div style="display: flex; gap: 60px;">
            <!-- Left: Form -->
            <div style="flex: 1;">
                <h2 class="serif-font" style="color: var(--forest-green); margin-top: 0; margin-bottom: 20px;">Upload New Creation</h2>
                <form th:action="@{/sell/upload}" method="post" enctype="multipart/form-data" class="upload-form">
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold;">Masterpiece Photo</label>
                        <input type="file" name="image" onchange="previewImage(event)" required>
                    </div>

                    <div id="preview-container" class="preview-box" style="display: none; margin-bottom: 20px;">
                        <img id="image-preview" src="" alt="Preview">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold;">Item Name</label>
                        <input type="text" name="name" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" placeholder="e.g. Hand-painted Ceramic Vase" required>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold;">Price (INR)</label>
                        <input type="number" name="price" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" placeholder="1500" required>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold;">Category</label>
                        <select name="category" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" required>
                            <option value="Paintings">Paintings</option>
                            <option value="Pottery">Pottery</option>
                            <option value="Crochet">Crochet</option>
                            <option value="Craft">Craft</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold;">Sell Where?</label>
                        <div style="display: flex; gap: 20px; align-items: center; padding: 10px 0;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="locationType" value="National" checked onchange="toggleLocationFields()">
                                <span>Nationally (Across India)</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="radio" name="locationType" value="Local" onchange="toggleLocationFields()">
                                <span>Locally (Specific Area/State)</span>
                            </label>
                        </div>
                    </div>

                    <div id="area-container" style="margin-bottom: 20px; display: none;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold;">Specify Area or State (India)</label>
                        <input type="text" id="specificLocation" name="specificLocation" list="india-locations" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" placeholder="e.g. Gujarat, Mumbai, Ahmedabad...">
                        <datalist id="india-locations">
                            <!-- States -->
                            <option value="Andhra Pradesh">
                            <option value="Arunachal Pradesh">
                            <option value="Assam">
                            <option value="Bihar">
                            <option value="Chhattisgarh">
                            <option value="Goa">
                            <option value="Gujarat">
                            <option value="Haryana">
                            <option value="Himachal Pradesh">
                            <option value="Jharkhand">
                            <option value="Karnataka">
                            <option value="Kerala">
                            <option value="Madhya Pradesh">
                            <option value="Maharashtra">
                            <option value="Manipur">
                            <option value="Meghalaya">
                            <option value="Mizoram">
                            <option value="Nagaland">
                            <option value="Odisha">
                            <option value="Punjab">
                            <option value="Rajasthan">
                            <option value="Sikkim">
                            <option value="Tamil Nadu">
                            <option value="Telangana">
                            <option value="Tripura">
                            <option value="Uttar Pradesh">
                            <option value="Uttarakhand">
                            <option value="West Bengal">
                            <!-- Major Cities/Areas -->
                            <option value="Ahmedabad">
                            <option value="Surat">
                            <option value="Vadodara">
                            <option value="Rajkot">
                            <option value="Mumbai">
                            <option value="Pune">
                            <option value="Nagpur">
                            <option value="Bangalore">
                            <option value="Chennai">
                            <option value="Delhi">
                            <option value="Hyderabad">
                            <option value="Kolkata">
                            <option value="Jaipur">
                            <option value="Lucknow">
                            <option value="Indore">
                            <option value="Thane">
                            <option value="Bhopal">
                            <option value="Visakhapatnam">
                            <option value="Patna">
                        </datalist>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <label style="display: block; margin-bottom: 10px; font-weight: bold;">Description</label>
                        <textarea name="description" style="width: 100%; height: 120px; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" placeholder="Share the story behind this creation..." required></textarea>
                    </div>

                    <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 0.9rem;">
                        By clicking upload, you agree to our <a th:href="@{/seller-agreement}" target="_blank" style="color: var(--tan); font-weight: bold;">Seller Terms & Policies</a>.
                    </div>

                    <button type="submit" class="btn-primary">Launch Masterpiece</button>
                </form>
            </div>

            <!-- Right: My Items -->
            <div style="flex: 1;">
                <h2 class="serif-font" style="color: var(--forest-green);">Your Items</h2>
                <div th:if="${#lists.isEmpty(myProducts)}" style="padding: 40px; border: 1px dashed #ddd; text-align: center; border-radius: 12px;">
                    <p>You haven't uploaded any items yet.</p>
                </div>

                <div th:each="p : ${myProducts}" style="display: flex; align-items: center; gap: 20px; background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; position: relative; overflow: hidden;">
                    <img th:src="${p.imageUrl.startsWith('http') ? p.imageUrl : '/images/' + p.imageUrl}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px;">

                    <div style="flex: 1;">
                        <h4 th:text="${p.name}" style="margin: 0; color: var(--forest-green); font-size: 1.1rem;"></h4>
                        <p th:text="'₹' + ${#numbers.formatDecimal(p.price, 0, 'COMMA', 2, 'POINT')}" style="margin: 5px 0; font-weight: bold; font-size: 1.1rem; color: var(--tan);"></p>

                        <div style="margin-top: 5px;">
                            <span th:if="${p.inStock}" style="color: #2d5a27; font-weight: bold; font-size: 0.8rem; background: #e8f5e9; padding: 3px 10px; border-radius: 12px;"><i class="fas fa-check-circle"></i> In Stock</span>
                            <span th:if="${!p.inStock}" style="color: #d63031; font-weight: bold; font-size: 0.8rem; background: #ffebee; padding: 3px 10px; border-radius: 12px;"><i class="fas fa-times-circle"></i> Out of Stock</span>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <form th:action="@{/product/toggle-stock}" method="POST">
                            <input type="hidden" name="id" th:value="${p.id}">
                            <button type="submit" style="background: var(--forest-green); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; width: 100%;"
                                    th:text="${p.inStock ? 'Mark OOS' : 'Mark In Stock'}">Toggle</button>
                        </form>
                        <form th:action="@{/product/delete}" method="POST" onsubmit="return confirm('Delete this masterpiece? The upload slot will NOT be reset (remains ' + ${user.lifetimeUploadCount} + '/5).')">
                            <input type="hidden" name="id" th:value="${p.id}">
                            <button type="submit" style="background: #d63031; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; width: 100%;">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
