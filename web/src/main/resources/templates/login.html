<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign In - Artisan Gallery</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--background);
        }
        .login-box {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 30px;
            box-sizing: border-box;
            outline: none;
        }
        .login-box input:focus {
            border-color: var(--forest-green);
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <h1 class="serif-font" style="color: var(--forest-green); margin-bottom: 5px;">Artisan Gallery</h1>
            <p style="color: var(--tan); font-weight: bold; font-family: 'Georgia', serif; margin-bottom: 30px;">Handmade with Soul</p>

            <p th:if="${error}" th:text="${error}" style="color: #d63031; margin-bottom: 20px;"></p>
            <p th:if="${param.deleted}" style="color: var(--forest-green); margin-bottom: 20px; font-weight: bold;">Account permanently deleted.</p>

            <form th:action="@{/login}" method="post">
                <input type="text" name="identifier" placeholder="Email or Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <p style="margin-top: 30px;">New here? <a th:href="@{/register}" style="color: var(--forest-green); font-weight: bold; text-decoration: none;">Create an Account</a></p>
        </div>
    </div>
</body>
</html>
