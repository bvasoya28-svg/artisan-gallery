<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Secure Checkout - Artisan Gallery</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="sticky-header">
        <div class="container header-content">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a th:href="@{/cart}" style="color: var(--forest-green); font-size: 1.2rem;"><i class="fas fa-chevron-left"></i></a>
                <div class="logo">
                    <h1><a th:href="@{/home}">Artisan Gallery</a></h1>
                </div>
            </div>

            <div class="user-profile-header" th:if="${user != null}">
                <span th:text="${user.fullName}">User Name</span>
                <img th:src="${user.profilePicture.startsWith('http') ? user.profilePicture : '/images/' + user.profilePicture}" alt="Profile">
            </div>
        </div>
    </header>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a th:href="@{/home}" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>

        <a th:href="@{/search}" class="bottom-nav-item">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </a>

        <a th:href="@{/cart}" class="bottom-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </a>

        <a th:href="@{/account}" class="bottom-nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </nav>

    <div class="container sub-page-container" style="padding-bottom: 100px;">
        <h1 class="serif-font" style="color: var(--forest-green); margin-bottom: 40px; margin-top: 20px;">Finalize Your Order</h1>

        <form th:action="@{/checkout/place-order}" method="POST">
            <div style="display: flex; gap: 50px;">
                <!-- Left: Shipping & Payment -->
                <div style="flex: 2;">
                    <!-- Shipping Address Section -->
                    <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 30px;">
                        <h3 class="serif-font" style="color: var(--forest-green); margin-top: 0;"><i class="fas fa-shipping-fast"></i> 1. Shipping Address</h3>
                        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                        <div th:if="${user.address != null && !user.address.isEmpty()}" style="margin-bottom: 20px;">
                            <label style="display: flex; align-items: flex-start; gap: 15px; cursor: pointer;">
                                <input type="radio" name="addressOption" value="default" checked style="margin-top: 5px;">
                                <div>
                                    <strong style="display: block; margin-bottom: 5px;">Use Saved Address</strong>
                                    <p th:text="${user.address}" style="margin: 0; color: #666;"></p>
                                </div>
                            </label>
                        </div>

                        <div th:if="${user.address == null || user.address.isEmpty()}" style="margin-bottom: 20px;">
                            <p style="color: #c62828;"><i class="fas fa-exclamation-triangle"></i> No address saved on your profile.</p>
                        </div>

                        <label style="display: flex; align-items: flex-start; gap: 15px; cursor: pointer;">
                            <input type="radio" name="addressOption" value="new" th:checked="${user.address == null || user.address.isEmpty()}" style="margin-top: 5px;" id="newAddressRadio">
                            <div style="flex: 1;">
                                <strong style="display: block; margin-bottom: 10px;">Ship to a New Address</strong>
                                <textarea name="newAddress" id="newAddressTextArea" class="form-control" style="height: 100px;" placeholder="Street name, Landmark, City, State, PIN code..." th:required="${user.address == null || user.address.isEmpty()}"></textarea>
                            </div>
                        </label>
                    </div>

                    <script>
                        document.getElementById('newAddressTextArea').addEventListener('focus', function() {
                            document.getElementById('newAddressRadio').checked = true;
                        });
                    </script>

                    <!-- Payment Method Section -->
                    <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: var(--shadow);">
                        <h3 class="serif-font" style="color: var(--forest-green); margin-top: 0;"><i class="fas fa-credit-card"></i> 2. Select Payment Method</h3>
                        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                            <label style="display: flex; align-items: center; gap: 15px; padding: 15px; border: 1px solid #eee; border-radius: 10px; cursor: pointer;">
                                <input type="radio" name="paymentMethod" value="GPay / BHIM UPI" required>
                                <span><i class="fas fa-mobile-alt"></i> GPay / BHIM UPI</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 15px; padding: 15px; border: 1px solid #eee; border-radius: 10px; cursor: pointer;">
                                <input type="radio" name="paymentMethod" value="Paytm">
                                <span><i class="fas fa-wallet"></i> Paytm</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 15px; padding: 15px; border: 1px solid #eee; border-radius: 10px; cursor: pointer;">
                                <input type="radio" name="paymentMethod" value="Debit/Credit Card">
                                <span><i class="far fa-credit-card"></i> Debit/Credit Card</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 15px; padding: 15px; border: 1px solid #eee; border-radius: 10px; cursor: pointer;">
                                <input type="radio" name="paymentMethod" value="Cash on Delivery (COD)">
                                <span><i class="fas fa-hand-holding-usd"></i> Cash on Delivery</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Right: Order Summary -->
                <div style="flex: 1;">
                    <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: var(--shadow); position: sticky; top: 100px;">
                        <h3 class="serif-font" style="color: var(--forest-green); margin-top: 0;">Order Summary</h3>
                        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                        <div th:each="item : ${checkoutItems}" style="display: flex; gap: 15px; margin-bottom: 15px;">
                            <img th:src="${item.imageUrl.startsWith('http') ? item.imageUrl : '/images/' + item.imageUrl}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 5px;">
                            <div style="flex: 1;">
                                <p style="margin: 0; font-size: 0.9rem; font-weight: bold;" th:text="${item.name}"></p>
                                <p style="margin: 0; font-size: 0.85rem; color: var(--forest-green);" th:text="'₹' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 2, 'POINT')}"></p>
                            </div>
                        </div>

                        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>Subtotal</span>
                            <span th:text="'₹' + ${#numbers.formatDecimal(total, 0, 'COMMA', 2, 'POINT')}"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 25px;">
                            <span>Shipping</span>
                            <span style="color: var(--forest-green); font-weight: bold;">FREE</span>
                        </div>

                        <div style="display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: bold; color: var(--forest-green); margin-bottom: 30px;">
                            <span>Total</span>
                            <span th:text="'₹' + ${#numbers.formatDecimal(total, 0, 'COMMA', 2, 'POINT')}"></span>
                        </div>

                        <button type="submit" class="btn-primary" style="width: 100%; padding: 18px; font-size: 1.2rem;">Place Order Now</button>
                        <p style="text-align: center; font-size: 0.8rem; color: #888; margin-top: 15px;">By placing your order, you agree to Artisan Gallery's conditions of use and privacy notice.</p>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
