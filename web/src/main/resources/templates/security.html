<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Security Settings - Artisan Gallery</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="sticky-header">
        <div class="container header-content">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a th:href="@{/account}" style="color: var(--forest-green); font-size: 1.2rem;"><i class="fas fa-chevron-left"></i></a>
                <div class="logo">
                    <h1><a th:href="@{/home}">Artisan Gallery</a></h1>
                </div>
            </div>

            <div class="user-profile-header" th:if="${user != null}">
                <span th:text="${user.fullName}">User Name</span>
                <img th:src="${user.profilePicture.startsWith('http') ? user.profilePicture : '/images/' + user.profilePicture}" alt="Profile">
            </div>
        </div>
    </header>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a th:href="@{/home}" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>

        <a th:href="@{/search}" class="bottom-nav-item">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </a>

        <a th:href="@{/cart}" class="bottom-nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </a>

        <a th:href="@{/account}" class="bottom-nav-item active" style="color: var(--tan);">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </nav>


    <div class="container sub-page-container">
        <div class="centered-form-wrapper" style="max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid #eee;">
            <h1 class="serif-font" style="color: var(--forest-green); margin-bottom: 20px; margin-top: 0;">Security</h1>
            <p>Secure your account with a strong password.</p>

            <hr>

            <p th:if="${param.success}" style="color: var(--forest-green); font-weight: bold; margin-bottom: 20px;">✓ Password changed successfully!</p>
            <p th:if="${error}" th:text="${error}" style="color: #d63031; margin-bottom: 20px;"></p>

            <form th:action="@{/account/security/password}" method="post">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: bold;">Current Password</label>
                    <input type="password" name="currentPassword" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" required>
                </div>
                <div style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: bold;">New Password</label>
                    <input type="password" name="newPassword" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-bottom: 40px;">Update Password</button>
            </form>

            <h3 class="serif-font" style="color: var(--forest-green); margin-bottom: 15px; border-top: 1px solid #eee; pt: 30px; margin-top: 30px; padding-top: 30px;">Account Actions</h3>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <a th:href="@{/seller-agreement}" class="account-section-card" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px; padding: 15px;">
                    <i class="fas fa-file-contract" style="color: var(--forest-green); font-size: 1.2rem;"></i>
                    <span class="serif-font">Seller Agreement</span>
                </a>
                <a th:href="@{/account/logout}" class="account-section-card" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px; padding: 15px; border-color: #ffebee;">
                    <i class="fas fa-sign-out-alt" style="color: #d63031; font-size: 1.2rem;"></i>
                    <span class="serif-font" style="color: #d63031;">Logout</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
